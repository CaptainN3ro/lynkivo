services:
  lynkivo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lynkivo
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Persistent data: links DB, settings, uploaded logos/favicons
      - lynkivo_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lynkivo_data:
    driver: local